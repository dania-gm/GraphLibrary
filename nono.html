<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TE QUEREMOS ABUELO</title>
    <style>
        :root {
            --rosa-claro: #ffe4e1;
            --rosa-fuerte: #ff69b4;
            --rojo-corazon: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--rosa-claro);
            font-family: 'Arial Round', 'Segoe UI', sans-serif;
            overflow: hidden; /* Para que los corazones no creen scroll */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Lluvia de corazones */
        .heart {
            position: absolute;
            top: -20px;
            color: var(--rojo-corazon);
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }

        /* Tarjeta principal */
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            border: 5px solid var(--rosa-fuerte);
        }

        h1 {
            color: var(--rosa-fuerte);
            margin-bottom: 20px;
            font-size: 2rem;
        }

        p {
            color: #555;
            font-size: 1.2rem;
        }

        .options {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f0f0f0;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        #btn-peluche {
            background-color: var(--rosa-fuerte);
            color: white;
            font-weight: bold;
        }

        #mensaje-final {
            display: none;
            font-size: 2.5rem;
            color: var(--rojo-corazon);
            font-weight: bold;
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1>¡TE QUEREMOS ABUELO!</h1>
        <div id="quiz-section">
            <p>¿Quién es tu nieto favorito?</p>
            <div class="options">
                <button onclick="crecerPeluche()">Dania</button>
                <button onclick="crecerPeluche()">Antonio</button>
                <button onclick="crecerPeluche()">Rodrigo</button>
                <button id="btn-peluche" onclick="ganar()">Peluche</button>
            </div>
        </div>
        <div id="mensaje-final">
            <img src="peluche.jpg" alt="" width="400" height="300">
            <br>
            ❤️ ¡TE QUIERO ABUELO! ❤️
        </div>
    </div>

    <script>
        let escala = 1;

        // Función para que caigan corazones
        function crearCorazon() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Generar corazones cada 300ms
        setInterval(crearCorazon, 300);

        // Función para agrandar el botón de Peluche
        function crecerPeluche() {
            escala += 0.4;
            const btn = document.getElementById('btn-peluche');
            btn.style.transform = `scale(${escala})`;
            
            // También movemos un poco los otros para que no se encimen
            if (escala > 3) {
                btn.style.zIndex = "100";
            }
        }

        // Función final
        function ganar() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('mensaje-final').style.display = 'block';
            
            // Lluvia masiva de corazones al final
            for(let i=0; i<50; i++) {
                setTimeout(crearCorazon, i * 50);
            }
        }
    </script>
</body>
</html>
